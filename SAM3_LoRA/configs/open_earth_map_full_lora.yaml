# SAM3 LoRA Training Configuration - LIGHT VERSION
# Lighter LoRA configuration for memory-constrained training
# Use this for faster iteration and lower memory usage

# Dataset settings
dataset:
  # train_json: "/teamspace/studios/this_studio/Small_OpenEarthMap_COCO/train.json"
  # val_json: "/teamspace/studios/this_studio/Small_OpenEarthMap_COCO/val.json"
  # image_dir: "/teamspace/studios/this_studio/Small_OpenEarthMap_COCO/images"

# Model settings
model:
  name: "facebook/sam3"
  cache_dir: null

# LoRA settings - REDUCED for memory efficiency
lora:
  rank: 32                   # Reduced from 64 to avoid OOM
  alpha: 32                  # 2x rank (scaling factor)
  dropout: 0.1               # Some dropout for regularization

  target_modules:
    # Standard attention projections (for replaced MultiheadAttention modules)
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "out_proj"
    # Vision backbone (ViT-style)
    - "qkv"                  # Fused Q/K/V projection in vision backbone
    - "proj"                 # Output projection in vision backbone attention
    - "fc1"                  # Vision backbone MLP first layer
    - "fc2"                  # Vision backbone MLP second layer
    # Language backbone (CLIP-style)
    - "c_fc"                 # Language backbone MLP first layer
    - "c_proj"               # Language backbone MLP second layer
    # Transformer encoder/decoder FFN
    - "linear1"              # Transformer FFN first layer
    - "linear2"              # Transformer FFN second layer

  # Apply LoRA to ALL components for maximum adaptation
  apply_to_vision_encoder: true    # Vision backbone (ViT)
  apply_to_text_encoder: true      # Language backbone (CLIP text encoder)
  apply_to_geometry_encoder: true  # Geometry encoder for prompts
  apply_to_detr_encoder: true      # DETR-style transformer encoder
  apply_to_detr_decoder: true      # DETR-style transformer decoder
  apply_to_mask_decoder: true      # Mask prediction head

# Training settings
training:
  data_dir: "/workspace/Small_OpenEarthMap_COCO"
  batch_size: 1         # T4 requires minimal batch size
  num_workers: 2
  
  # Memory Optimization for many categories/objects
  #max_queries_per_image: 1   # Randomly sample 1 category if image has more

  learning_rate: 1e-5        # Increased from 1e-5 (SAM3 uses 1e-4 to 5e-4 for fine-tuning)
  weight_decay: 0.01
  adam_beta1: 0.9
  adam_beta2: 0.999
  adam_epsilon: 1e-8
  max_grad_norm: 1.0

  num_epochs: 100       # Reduced from 500 (small dataset overfits quickly)
  warmup_steps: 200     # Reduced from 1000 (proportional to dataset size)
  lr_scheduler: "cosine"

  logging_steps: 10
  eval_steps: 100       # More frequent validation (from 500)
  save_steps: 100       # More frequent checkpoints (from 1000)
  save_total_limit: 5

  mixed_precision: "bf16"
  seed: 42
  gradient_accumulation_steps: 1  # Effective batch = 2 × 8 = 16

output:
  output_dir: "outputs/open_earth_map_full_lora"
  logging_dir: "logs"
  save_lora_only: true
  push_to_hub: false
  hub_model_id: null

evaluation:
  metric: "iou"
  save_predictions: false
  compute_metrics_during_training: true

hardware:
  device: "cuda"
  dataloader_pin_memory: true
  use_compile: false
